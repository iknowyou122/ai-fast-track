[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [
  "__pycache__",
  ".venv",
  "venv",
  "path/to/venv",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.11"
files = ["app"]
ignore_missing_imports = true
pretty = true
exclude = [
  "__pycache__",
  "tests",
  "path/to/venv",
]
